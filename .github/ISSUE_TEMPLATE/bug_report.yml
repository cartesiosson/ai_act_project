name: 🐛 Bug report
description: Report a problem with SERAMIS
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Frontend (React UI)
        - Backend (FastAPI)
        - Reasoner service
        - Forensic agent
        - MCP SPARQL server
        - Ontology / semantic resources
        - Docker / deployment
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or attach screenshots.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "v1.0.0 or commit hash"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Docker version, browser, etc."
